<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NUR Streaming</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08101a;
  --panel:#0d1b2a;
  --card:#0f2035;
  --card2:#132540;
  --accent:#00d4ff;
  --accent2:#00a8cc;
  --text:#e8f4f8;
  --muted:#5a7f96;
  --border:#1a3a52;
  --red:#ff3b5c;
  --green:#00e676;
  --gold:#ffd700;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;
  -webkit-text-size-adjust:100%;}

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4);}70%{box-shadow:0 0 0 8px rgba(0,212,255,0);}}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(0,212,255,.6);}50%{text-shadow:0 0 20px rgba(0,212,255,1),0 0 40px rgba(0,212,255,.4);}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:1000;
  background:linear-gradient(180deg,rgba(8,16,26,.99) 0%,rgba(8,16,26,.95) 100%);
  border-bottom:1px solid rgba(0,212,255,.15);
  display:flex;align-items:center;gap:12px;padding:0 18px;
  backdrop-filter:blur(10px);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#003d5c,#00a8cc);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;
  border:1px solid rgba(0,212,255,.4);
  box-shadow:0 0 15px rgba(0,212,255,.2);
}
.logo-text{
  font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;
}
.logo-text span{color:var(--accent);animation:glow 3s ease-in-out infinite;}

.live-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,59,92,.15);border:1px solid rgba(255,59,92,.4);
  padding:4px 10px;border-radius:20px;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.4s infinite;}
.live-badge span{font-size:10px;font-weight:800;color:var(--red);letter-spacing:1.5px;}

.network-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);
  padding:4px 10px;border-radius:20px;
}
.net-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.network-badge span{font-size:10px;font-weight:700;color:var(--green);letter-spacing:.5px;}

.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.cnt{
  font-size:11px;color:var(--accent);background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.2);padding:4px 12px;border-radius:20px;
  white-space:nowrap;font-weight:600;
}
.clock{
  font-size:13px;font-weight:700;color:#fff;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  padding:4px 12px;border-radius:8px;letter-spacing:1px;
  font-variant-numeric:tabular-nums;
}
#mobBtn{
  display:none;background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;color:#000;padding:8px 16px;border-radius:8px;
  font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.5px;
  -webkit-tap-highlight-color:transparent;
}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;padding-top:60px;}
.left{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* ── PLAYER ZONE ── */
.pzone{flex:1;padding:14px 14px 0;display:flex;flex-direction:column;min-height:0;}
.pshell{
  position:relative;width:100%;flex:1;background:#000;
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(0,212,255,.2);
  display:flex;flex-direction:column;min-height:0;
  box-shadow:0 0 40px rgba(0,0,0,.6),0 0 0 1px rgba(0,212,255,.05);
}
.pshell video{width:100%;flex:1;display:block;object-fit:contain;background:#000;min-height:0;}

/* player corner label */
.p-corner{
  position:absolute;top:14px;right:14px;z-index:25;
  display:flex;gap:6px;
}
.p-corner-btn{
  width:38px;height:38px;border-radius:10px;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:#fff;
  backdrop-filter:blur(4px);
  -webkit-tap-highlight-color:transparent;
}
.p-corner-btn.accent{background:rgba(0,212,255,.9);border-color:var(--accent);color:#000;}

.p-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(8,16,26,.92) 0%,rgba(13,27,42,.88) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:30;transition:opacity .4s;
}
.p-overlay.gone{opacity:0;pointer-events:none;}
.p-logo{width:80px;height:60px;object-fit:contain;border-radius:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);padding:6px;}
.p-channel-badge{
  font-size:10px;font-weight:800;letter-spacing:2px;color:var(--accent);
  background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);
  padding:3px 12px;border-radius:20px;text-transform:uppercase;
}
.p-title{font-size:20px;font-weight:800;color:#fff;text-align:center;padding:0 20px;}
.p-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.5px;}
.spinner{
  width:44px;height:44px;border:3px solid rgba(0,212,255,.1);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
.p-error{
  position:absolute;inset:0;background:rgba(8,16,26,.95);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:30;
}
.p-error .eico{font-size:48px;}
.p-error h3{color:#fff;font-size:16px;font-weight:800;}
.p-error p{color:rgba(255,255,255,.4);font-size:12px;text-align:center;padding:0 24px;line-height:1.7;}
.retry-btn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;border:none;padding:10px 28px;border-radius:8px;
  cursor:pointer;font-size:13px;font-weight:800;letter-spacing:.5px;
}

/* ── NOW PLAYING BAR ── */
.nowbar{
  background:linear-gradient(180deg,rgba(13,27,42,.98) 0%,rgba(13,27,42,1) 100%);
  border-top:1px solid rgba(0,212,255,.1);
  padding:10px 16px;display:none;align-items:center;gap:12px;flex-shrink:0;
}
.nb-logo{
  width:44px;height:32px;object-fit:contain;border-radius:7px;
  background:var(--card);border:1px solid var(--border);
  flex-shrink:0;padding:3px;
}
.nb-info{flex:1;min-width:0;}
.nb-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nb-grp{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.nb-live{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.dot-r{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.4s infinite;box-shadow:0 0 6px var(--red);}
.nb-live span{font-size:10px;color:var(--red);font-weight:800;letter-spacing:1.5px;}
.nb-btns{display:flex;gap:6px;flex-shrink:0;}
.nb-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);width:32px;height:32px;border-radius:8px;
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all .2s;
}
.nb-btn:hover{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.4);color:var(--accent);}

/* ── RECO STRIP (mobile) ── */
.reco-strip{
  display:none;padding:10px 10px 0;min-height:0;overflow:hidden;
  flex-direction:column;width:100%;
}
.reco-title{
  font-size:10px;font-weight:800;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;flex-shrink:0;
}
.reco-scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;align-content:start;padding-bottom:12px;width:100%;
}
.reco-scroll::-webkit-scrollbar{width:2px;}
.reco-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.reco-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:9px 4px 7px;display:flex;flex-direction:column;
  align-items:center;gap:5px;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;min-width:0;transition:all .2s;
}
.reco-card.active{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.5);}
.reco-card img{width:42px;height:30px;object-fit:contain;border-radius:5px;}
.reco-card span{font-size:9px;color:var(--muted);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}

/* ── SIDEBAR ── */
.sidebar{
  width:380px;flex-shrink:0;
  background:var(--panel);
  border-left:1px solid rgba(0,212,255,.08);
  display:flex;flex-direction:column;overflow:hidden;
}

/* sidebar top header */
.sb-header{
  padding:16px 16px 10px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sb-title{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.sb-subtitle{font-size:18px;font-weight:800;color:#fff;line-height:1.2;}
.sb-subtitle span{color:var(--accent);}

.drag-handle{display:none;}
.sb-search{padding:12px 12px 8px;flex-shrink:0;}
.sb-s-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,212,255,.05);
  border:1px solid rgba(0,212,255,.15);
  border-radius:10px;padding:10px 14px;
  transition:border-color .2s;
}
.sb-s-inner:focus-within{border-color:rgba(0,212,255,.5);}
.sb-s-inner input{
  background:none;border:none;outline:none;
  color:var(--text);font-size:13px;width:100%;-webkit-appearance:none;
}
.sb-s-inner input::placeholder{color:var(--muted);}
.si{color:var(--muted);font-size:15px;flex-shrink:0;}

/* category pills */
.cat-row{
  display:flex;gap:6px;padding:0 12px 10px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch;
}
.cat-row::-webkit-scrollbar{display:none;}
.cpill{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
  user-select:none;-webkit-tap-highlight-color:transparent;
  min-height:32px;display:flex;align-items:center;transition:all .2s;letter-spacing:.3px;
}
.cpill.active{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border-color:transparent;color:#000;font-weight:800;
}
.cpill:not(.active):hover{border-color:rgba(0,212,255,.3);color:var(--accent);}

/* channel count per pill */
.cpill-cnt{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;
  background:rgba(255,255,255,.12);font-size:9px;font-weight:800;
  margin-left:5px;
}
.cpill.active .cpill-cnt{background:rgba(0,0,0,.2);color:#000;}

/* channel list */
.chlist{
  flex:1;overflow-y:auto;padding:4px 8px 10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  -webkit-overflow-scrolling:touch;
}
.chlist::-webkit-scrollbar{width:3px;}
.chlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* channel item */
.chi{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:12px;cursor:pointer;margin-bottom:3px;
  border:1px solid transparent;user-select:none;
  -webkit-tap-highlight-color:transparent;min-height:64px;
  transition:all .15s;position:relative;
}
.chi:hover{background:rgba(0,212,255,.05);border-color:rgba(0,212,255,.1);}
.chi.active{
  background:rgba(0,212,255,.08);
  border-color:rgba(0,212,255,.3);
}

/* channel number badge */
.ch-num{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:9px;font-weight:800;color:var(--muted);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  padding:2px 7px;border-radius:20px;letter-spacing:.5px;
}
.chi.active .ch-num{
  background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.4);color:var(--accent);
}

/* favorites btn */
.ch-fav{
  position:absolute;right:10px;top:8px;
  font-size:11px;color:var(--muted);cursor:pointer;
  display:none;
}
.chi:hover .ch-fav{display:block;}
.chi.active .ch-fav{display:block;color:var(--gold);}

.ch-logo{
  width:46px;height:46px;border-radius:10px;background:var(--card);
  object-fit:contain;flex-shrink:0;border:1px solid var(--border);padding:4px;
  transition:border-color .2s;
}
.chi.active .ch-logo{border-color:rgba(0,212,255,.3);}
.ch-meta{flex:1;min-width:0;padding-right:40px;}
.ch-gl{
  font-size:9px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:3px;
}
.ch-nm{
  font-size:14px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chi.active .ch-nm{color:#fff;font-weight:700;}

.nores{text-align:center;padding:40px 14px;color:var(--muted);font-size:13px;line-height:1.8;}

/* Skeleton */
.sk-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  margin-bottom:3px;border-radius:12px;min-height:64px;
}
.sk-logo{width:46px;height:46px;border-radius:10px;flex-shrink:0;}
.sk-lines{flex:1;}
.sk-l1{height:8px;width:35%;border-radius:4px;margin-bottom:8px;}
.sk-l2{height:13px;width:68%;border-radius:4px;}
.sk-logo,.sk-l1,.sk-l2{
  background:linear-gradient(90deg,var(--card2) 25%,#1a3050 50%,var(--card2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}

/* backdrop */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:990;backdrop-filter:blur(2px);}
.backdrop.show{display:block;}

/* ══ MOBILE ≤ 768px ══ */
@media(max-width:768px){
  #mobBtn{display:block!important;}
  .network-badge{display:none;}
  .clock{display:none;}

  .layout{flex-direction:column;overflow:hidden;}
  .left{
    flex:1;overflow:hidden;display:flex;flex-direction:column;
    height:calc(100vh - 60px);
  }
  .pzone{flex:none;padding:10px 10px 0;}
  .pshell{flex:none;width:100%;padding-top:56.25%;height:0;display:block;}
  .pshell video{position:absolute;top:0;left:0;width:100%;height:100%;}
  .p-overlay,.p-error{position:absolute;}

  .nowbar{padding:8px 12px;}
  .reco-strip{display:flex!important;flex:1;min-height:0;width:100%;}

  .sidebar{
    position:fixed;left:0;right:0;bottom:0;
    width:100%!important;height:82vh;
    border-top:2px solid rgba(0,212,255,.2);
    border-radius:22px 22px 0 0;
    z-index:995;
    transform:translateY(105%);
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    box-shadow:0 -20px 60px rgba(0,0,0,.95);
    display:flex;flex-direction:column;
  }
  .sidebar.open{transform:translateY(0)!important;}
  .drag-handle{
    display:block;width:44px;height:4px;border-radius:4px;
    background:rgba(0,212,255,.2);margin:12px auto 4px;flex-shrink:0;
  }
  .sb-header{display:none;}
}

/* ══ DESKTOP ≥ 769px ══ */
@media(min-width:769px){
  #mobBtn{display:none!important;}
  .backdrop{display:none!important;}
  .drag-handle{display:none!important;}
  .reco-strip{display:none!important;}
  .sidebar{position:static;transform:none!important;
    height:calc(100vh - 60px);border-radius:0;border-top:none;}
  .left{height:calc(100vh - 60px);}
  .pzone{flex:1;min-height:0;}
  .pshell{height:100%;display:flex;}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">N</div>
    <span class="logo-text">NUR <span>Streaming</span></span>
  </a>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span>LIVE TV</span>
  </div>
  <div class="network-badge">
    <div class="net-dot"></div>
    <span>NETWORK SECURE</span>
  </div>
  <div class="hdr-r">
    <span class="clock" id="clockEl">--:--:--</span>
    <span class="cnt" id="chCount">Loading...</span>
    <button id="mobBtn">&#9776; Channels</button>
  </div>
</header>

<div class="backdrop" id="backdrop"></div>

<div class="layout">
  <div class="left">
    <div class="pzone">
      <div class="pshell" id="pshell">
        <video id="vid" controls playsinline webkit-playsinline autoplay></video>

        <div class="p-overlay" id="pov">
          <img class="p-logo" id="pLogo" src="" alt="">
          <div class="p-channel-badge">CHANNEL BROWSER</div>
          <div class="p-title" id="pTitle">Welcome to NUR Streaming</div>
          <div class="p-sub" id="pSub">Find your next stream</div>
          <div class="spinner" id="pSpin"></div>
        </div>

        <div class="p-error" id="perr">
          <div class="eico">📡</div>
          <h3>Stream Unavailable</h3>
          <p>Channel temporarily offline.<br>Try another channel or retry.</p>
          <button class="retry-btn" id="btnRetry">&#8635; Retry</button>
        </div>

        <div id="tapPlay" style="position:absolute;inset:0;z-index:40;display:none;
          background:rgba(0,0,0,.55);align-items:center;justify-content:center;
          flex-direction:column;gap:12px;cursor:pointer;">
          <div style="width:72px;height:72px;border-radius:50%;
            background:linear-gradient(135deg,var(--accent2),var(--accent));
            display:flex;align-items:center;justify-content:center;
            font-size:30px;color:#000;animation:pulse 2s infinite;">&#9654;</div>
          <span style="color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px;">Tap to Play</span>
        </div>
      </div>
    </div>

    <!-- NOW PLAYING BAR -->
    <div class="nowbar" id="nowbar">
      <img class="nb-logo" id="nbLogo" src="" alt="">
      <div class="nb-info">
        <div class="nb-name" id="nbName">—</div>
        <div class="nb-grp" id="nbGrp">—</div>
      </div>
      <div class="nb-live"><div class="dot-r"></div><span>LIVE</span></div>
      <div class="nb-btns">
        <button class="nb-btn" id="nbPrev" title="Previous">&#9664;</button>
        <button class="nb-btn" id="nbNext" title="Next">&#9654;</button>
      </div>
    </div>

    <!-- RECO STRIP (mobile) -->
    <div class="reco-strip" id="recoStrip">
      <div class="reco-title" id="recoTitle">More Channels</div>
      <div class="reco-scroll" id="recoScroll"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="drag-handle" id="dragHandle"></div>
    <div class="sb-header">
      <div class="sb-title">Channel Browser</div>
      <div class="sb-subtitle">Find your next <span>stream</span></div>
    </div>
    <div class="sb-search">
      <div class="sb-s-inner">
        <span class="si">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Search channels..." autocomplete="off">
      </div>
    </div>
    <div class="cat-row" id="catRow"></div>
    <div class="chlist" id="chList"></div>
  </div>
</div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/sanjoykb/-KB-TV-Playlist/refs/heads/main/Github%20Auto%20Update%20Channel.m3u';

/* parse M3U playlist text into {name,group,logo,url}[] */
function parseM3U(text){
  const lines=text.split(/\r?\n/);
  const out=[];
  let cur=null;
  for(let raw of lines){
    const line=raw.trim();
    if(!line||line.startsWith('#EXTM3U'))continue;
    if(line.startsWith('#EXTINF')){
      const logoM=line.match(/tvg-logo="([^"]*)"/i);
      const grpM=line.match(/group-title="([^"]*)"/i);
      const nameM=line.match(/,(.*)$/);
      cur={
        logo:logoM?logoM[1]:'',
        group:grpM?grpM[1]:'Channels',
        name:nameM?nameM[1].trim():'Unknown'
      };
    }else if(line.startsWith('#')){
      continue;
    }else if(cur){
      cur.url=line;
      out.push(cur);
      cur=null;
    }
  }
  return out;
}
const GC = {
  Sports:'#00e676',Bangla:'#00d4ff',News:'#ff3b5c',
  English:'#b388ff',Hindi:'#ffd740',Music:'#f48fb1',
  Channels:'#4dd0e1',Imported:'#90a4ae'
};

let chs=[], curIdx=-1, curGrp='All', hlsObj=null, retUrl='';
let skipAttempts=new Set();

/* helpers */
const $=id=>document.getElementById(id);
const isMob=()=>window.innerWidth<=768;
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* clock */
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  $('clockEl').textContent=h+':'+m+':'+s;
}
setInterval(updateClock,1000);
updateClock();

/* tap helper */
function tap(el,fn){
  if(!el)return;
  let moved=false;
  el.addEventListener('touchstart',()=>{moved=false;},{passive:true});
  el.addEventListener('touchmove',()=>{moved=true;},{passive:true});
  el.addEventListener('touchend',e=>{if(!moved){e.preventDefault();fn();}},{passive:false});
  el.addEventListener('click',fn);
}

/* sidebar */
function openSidebar(){$('sidebar').classList.add('open');$('backdrop').classList.add('show');}
function closeSidebar(){$('sidebar').classList.remove('open');$('backdrop').classList.remove('show');}

/* fullscreen */
function toggleFS(){
  const v=$('vid');
  if(document.fullscreenElement){document.exitFullscreen();}
  else if(v.requestFullscreen){v.requestFullscreen();}
  else if(v.webkitRequestFullscreen){v.webkitRequestFullscreen();}
}

/* init */
async function init(){
  showSkel();
  try{
    const r=await fetch(JSON_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const text=await r.text();
    chs=parseM3U(text);
    if(!Array.isArray(chs)||!chs.length)throw new Error('empty');
    $('chCount').textContent=chs.length+' channels';
    buildCats();
    renderList(chs);
    const si=chs.findIndex(c=>c.name&&c.name.toLowerCase().includes('t sports'));
    playCh(si>=0?si:0);
  }catch(e){
    $('chCount').textContent='Error';
    $('chList').innerHTML='<div class="nores">⚠️ Failed to load channels.<br>Check connection & reload.</div>';
    $('pSub').textContent='Load failed';
    $('pSpin').style.display='none';
  }
}

/* skeleton */
function showSkel(){
  let h='';
  for(let i=0;i<14;i++)h+=`<div class="sk-item"><div class="sk-logo"></div><div class="sk-lines"><div class="sk-l1"></div><div class="sk-l2"></div></div></div>`;
  $('chList').innerHTML=h;
}

/* categories */
function getGroups(){
  const s=new Set(chs.map(c=>c.group).filter(Boolean));
  const pri=['Sports','Bangla','News','English','Hindi','Music','Channels','Imported'];
  const ord=pri.filter(g=>s.has(g));
  s.forEach(g=>{if(!pri.includes(g))ord.push(g);});
  return['All',...ord];
}

function buildCats(){
  const row=$('catRow');
  row.innerHTML='';
  getGroups().forEach(g=>{
    const cnt=g==='All'?chs.length:chs.filter(c=>c.group===g).length;
    const d=document.createElement('div');
    d.className='cpill'+(g===curGrp?' active':'');
    d.innerHTML=esc(g)+'<span class="cpill-cnt">'+cnt+'</span>';
    tap(d,()=>filterGroup(g));
    row.appendChild(d);
  });
}

function filterGroup(g){
  curGrp=g;
  document.querySelectorAll('.cpill').forEach(p=>{
    const txt=p.childNodes[0]?p.childNodes[0].textContent.trim():'';
    p.classList.toggle('active',txt===g);
  });
  applyFilter();
}

function applyFilter(){
  const q=$('searchInput').value.toLowerCase().trim();
  let list=curGrp==='All'?chs:chs.filter(c=>c.group===curGrp);
  if(q)list=list.filter(c=>c.name.toLowerCase().includes(q));
  renderList(list);
}

/* channel list */
function renderList(list){
  const el=$('chList');
  if(!list.length){el.innerHTML='<div class="nores">No channels found</div>';return;}
  el.innerHTML='';
  list.forEach((ch,listIdx)=>{
    const i=chs.indexOf(ch);
    const col=GC[ch.group]||'#64748b';
    const chNum='CH '+(listIdx+1);
    const d=document.createElement('div');
    d.className='chi'+(curIdx===i?' active':'');
    d.id='ci'+i;
    d.innerHTML=`
      <img class="ch-logo" src="${esc(ch.logo||'')}" alt="${esc(ch.name)}" onerror="this.style.opacity='.1'">
      <div class="ch-meta">
        <div class="ch-gl" style="color:${col}">${esc(ch.group||'')}</div>
        <div class="ch-nm">${esc(ch.name)}</div>
      </div>
      <span class="ch-num">${chNum}</span>`;
    tap(d,()=>playCh(i));
    el.appendChild(d);
  });
}

/* reco strip */
function buildReco(){
  const strip=$('recoStrip');
  const scroll=$('recoScroll');
  if(!isMob()){strip.style.display='none';return;}
  const grp=chs[curIdx]?chs[curIdx].group:null;
  let pool=grp?chs.filter((c,i)=>c.group===grp&&i!==curIdx):chs.filter((_,i)=>i!==curIdx);
  if(!pool.length)pool=chs.filter((_,i)=>i!==curIdx);
  if(!pool.length){strip.style.display='none';return;}
  strip.style.display='flex';
  strip.style.flexDirection='column';
  $('recoTitle').textContent=grp?'More '+grp:'More Channels';
  scroll.innerHTML='';
  pool.forEach(ch=>{
    const i=chs.indexOf(ch);
    const card=document.createElement('div');
    card.className='reco-card'+(curIdx===i?' active':'');
    card.innerHTML=`<img src="${esc(ch.logo||'')}" alt="${esc(ch.name)}" onerror="this.style.opacity='.1'">
      <span>${esc(ch.name)}</span>`;
    tap(card,()=>playCh(i));
    scroll.appendChild(card);
  });
}

/* play channel */
function playCh(idx,auto){
  const ch=chs[idx];
  if(!ch)return;
  if(!auto)skipAttempts=new Set();
  curIdx=idx; retUrl=ch.url;
  const _tp=$('tapPlay');if(_tp)_tp.style.display='none';

  $('pLogo').src=ch.logo||'';
  $('pTitle').textContent=ch.name;
  $('pSub').textContent=(ch.group||'').toUpperCase()+' • LIVE';
  $('pSpin').style.display='block';
  $('pov').classList.remove('gone');
  $('perr').style.display='none';

  $('nowbar').style.display='flex';
  $('nbLogo').src=ch.logo||'';
  $('nbName').textContent=ch.name;
  $('nbGrp').textContent=ch.group||'';

  document.querySelectorAll('.chi').forEach(e=>e.classList.remove('active'));
  const el=$('ci'+idx);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});}

  buildReco();
  loadStream(ch.url);
  if(isMob())closeSidebar();
}

/* stream */
let loadToken=0, watchdogId=null, netRetryCount=0;
function loadStream(url){
  const v=$('vid');
  if(hlsObj){hlsObj.destroy();hlsObj=null;}
  v.pause();v.removeAttribute('src');v.load();

  clearTimeout(watchdogId);
  netRetryCount=0;
  const myToken=++loadToken;
  watchdogId=setTimeout(()=>{
    if(myToken===loadToken)autoSkipOnError();
  },12000);

  if(Hls.isSupported()){
    hlsObj=new Hls({enableWorker:true,lowLatencyMode:true,
      maxBufferLength:30,liveSyncDurationCount:3,liveMaxLatencyDurationCount:6,
      fragLoadingMaxRetry:4,manifestLoadingMaxRetry:3});
    hlsObj.loadSource(url);
    hlsObj.attachMedia(v);
    hlsObj.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.muted=false;
      const p=v.play();
      if(p!==undefined){
        p.then(()=>{fadeOv(myToken);}).catch(()=>{
          fadeOv(myToken);
          const tp=$('tapPlay');
          tp.style.display='flex';
          tp.onclick=()=>{v.play().catch(()=>{});tp.style.display='none';};
        });
      }else{fadeOv(myToken);}
    });
    hlsObj.on(Hls.Events.ERROR,(_,d)=>{
      if(myToken!==loadToken)return;
      if(d.fatal){
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
          netRetryCount++;
          netRetryCount<=3?hlsObj.startLoad():autoSkipOnError();
        }else{autoSkipOnError();}
      }
    });
  }else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=url;
    v.addEventListener('loadedmetadata',()=>{
      const p=v.play();
      if(p!==undefined){
        p.then(()=>{fadeOv(myToken);}).catch(()=>{
          fadeOv(myToken);
          const tp=$('tapPlay');
          tp.style.display='flex';
          tp.onclick=()=>{v.play().catch(()=>{});tp.style.display='none';};
        });
      }else{fadeOv(myToken);}
    },{once:true});
    v.addEventListener('error',()=>{if(myToken===loadToken)autoSkipOnError();},{once:true});
  }else{autoSkipOnError();}
}

function fadeOv(token){
  if(token!==undefined&&token!==loadToken)return;
  clearTimeout(watchdogId);
  setTimeout(()=>{$('pov').classList.add('gone');$('pSpin').style.display='none';},600);
}
function showErr(){clearTimeout(watchdogId);$('pov').classList.add('gone');$('perr').style.display='flex';}

/* auto-skip to next channel on load failure; stops once one plays or all are exhausted */
function autoSkipOnError(){
  clearTimeout(watchdogId);
  if(curIdx<0||!chs.length)return showErr();
  skipAttempts.add(curIdx);
  if(skipAttempts.size>=chs.length){showErr();return;}
  let n=(curIdx+1)%chs.length;
  while(skipAttempts.has(n))n=(n+1)%chs.length;
  playCh(n,true);
}

/* nav */
function getIdx(){
  const l=curGrp==='All'?chs:chs.filter(c=>c.group===curGrp);
  return l.map(c=>chs.indexOf(c));
}
function prevCh(){const l=getIdx(),p=l.indexOf(curIdx);if(p>0)playCh(l[p-1]);else if(curIdx>0)playCh(curIdx-1);}
function nextCh(){const l=getIdx(),p=l.indexOf(curIdx);if(p>=0&&p<l.length-1)playCh(l[p+1]);else if(curIdx<chs.length-1)playCh(curIdx+1);}
function toggleMute(){const v=$('vid');v.muted=!v.muted;}

/* events */
tap($('mobBtn'),openSidebar);
tap($('backdrop'),closeSidebar);
tap($('dragHandle'),closeSidebar);
tap($('nbPrev'),prevCh);
tap($('nbNext'),nextCh);
tap($('muteBtn'),toggleMute);
tap($('btnRetry'),()=>{
  if(!retUrl)return;
  $('perr').style.display='none';
  $('pov').classList.remove('gone');
  loadStream(retUrl);
});

$('searchInput').addEventListener('input',applyFilter);

document.addEventListener('keydown',e=>{
  if(document.activeElement===$('searchInput'))return;
  if(e.key==='ArrowDown'){e.preventDefault();nextCh();}
  if(e.key==='ArrowUp'){e.preventDefault();prevCh();}
  if(e.key==='m'||e.key==='M')toggleMute();
  if(e.key==='Escape')closeSidebar();
  if(e.key==='f'||e.key==='F')toggleFS();
});

window.addEventListener('resize',()=>{if(!isMob())closeSidebar();buildReco();});

let _ty=0;
$('sidebar').addEventListener('touchstart',e=>{_ty=e.touches[0].clientY;},{passive:true});
$('sidebar').addEventListener('touchmove',e=>{if(e.touches[0].clientY-_ty>80)closeSidebar();},{passive:true});

init();
</script>
